<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Archivo de estilos CSS -->
    <link rel="stylesheet" href="/CSS/style.css" />
    <!-- Archivo conexion con Javascript -->
    <script src="JS/script.js" defer></script>
  </head>
  <body>
    <!-- Encabezado -->
    <header>
      <!-- Titulo principal -->
      <h1 id="encabezado" class="titulo">Paleta de Colores</h1>
    </header>

    <!-- principal -->
    <main id="principal" class="contenedor-principal">
      <!-- Article contenedor de tarjetas -->
      <article id="articulo" class="contenedor-colores">
        <!-- Tarjetas de los colores -->
        <div id="tarjeta" class="card1">Item1</div>
        <div id="tarjeta" class="card2">Item2</div>
        <div id="tarjeta" class="card3">Item3</div>
        <div id="tarjeta" class="card4">Item4</div>
        <div id="tarjeta" class="card5">Item5</div>
        <div id="tarjeta" class="card6">Item6</div>
      </article>
    </main>
    <!-- Botones -->
    <section id="articulo-botones" class="contenedor-botones">
      <button id="generar-paleta" class="boton-generar-paleta">
        Generar paleta
      </button>
      <button id="agregar-Color" class="boton-agregar-color">
        Agregar Color
      </button>
      <button id="refrescar-pagina" class="boton-refrescar-pagina">
        Actualizar Pagina
      </button>
    </section>
    <!-- Footer -->
    <footer id="info_pagina" class="footer-pagina">info</footer>
  </body>
</html>
